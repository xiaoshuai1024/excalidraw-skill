<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Excalidraw renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    /* The SVG must be laid out on screen for svg_el.screenshot() to capture it. */
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    // Load Excalidraw once, as a module. We expose a Promise that resolves only
    // AFTER the dynamic import has completed, so the Python driver never calls
    // renderDiagram before exportToSvg is actually available. This removes the
    // race that the __moduleReady-flag approach has (a flag set by the module
    // script running does not mean the import() inside it has finished).
    //
    // Version is pinned. The `?bundle` query is REQUIRED: without it, esm.sh
    // serves Excalidraw as dozens of cascading module requests (react,
    // radix-ui, ...) and the total load time blows past any reasonable
    // timeout. Bundling collapses it into one fetch.
    const EXCAL_VERSION = "0.18.0";

    window.__excalReady = import(`https://esm.sh/@excalidraw/excalidraw@${EXCAL_VERSION}?bundle`)
      .then((mod) => {
        if (typeof mod.exportToSvg !== "function") {
          throw new Error(
            "Loaded Excalidraw module has no exportToSvg. " +
            "The package layout may have changed; check the pinned version."
          );
        }
        window.__excal = mod;
        // Plain boolean the driver can poll with wait_for_function (which does
        // not support `await`). Set ONLY after the module is fully usable.
        window.__excalDone = true;
      })
      .catch((err) => {
        // Surface the failure so the driver can read it instead of timing out.
        window.__excalError = String(err && err.message ? err.message : err);
        window.__excalDone = true;
      });

    /**
     * Render an Excalidraw scene to an <svg> element appended to #root.
     *
     * Uses TWO-PASS rendering to solve text centering, which is otherwise
     * unsolvable in a headless environment:
     *
     * The Excalidraw hand-drawn font "Virgil" is NOT available in the bare
     * page (Chromium falls back to serif, which has completely different
     * metrics). Excalidraw embeds Virgil as @font-face INSIDE exported SVGs,
     * but only at export time. So any text measurement done before export is
     * wrong, and exportToSvg trusts the stored text x/y/width/height as-is —
     * leading to off-center labels.
     *
     * PASS 1 (probe): export once. Extract the @font-face from the result,
     * inject it into the page, and load the font. Now the page really has Virgil.
     *
     * PASS 2 (measure + re-export): measure every bound text label's real
     * pixel width via getBoundingClientRect using the now-loaded Virgil, write
     * back exactly-centered x/y/width/height, then export again.
     */
    window.renderDiagram = async function (scene) {
      try {
        await window.__excalReady;

        const excal = window.__excal;
        let normalized;
        try {
          normalized = excal.restore(scene, null);
        } catch (e) {
          normalized = { elements: scene.elements, appState: scene.appState, files: scene.files };
        }

        // convertToExcalidrawElements re-validates elements and recomputes text
        // metrics; without it, hand-authored text with stale/missing fields is
        // silently dropped by exportToSvg.
        if (typeof excal.convertToExcalidrawElements === "function") {
          try {
            normalized.elements = excal.convertToExcalidrawElements(normalized.elements);
          } catch (e) {}
        }

        const appState = Object.assign(
          { exportBackground: true, exportWithDarkMode: false, viewBackgroundColor: "#ffffff" },
          normalized.appState || {}
        );
        const exportOpts = {
          elements: normalized.elements,
          appState: appState,
          files: normalized.files || {},
        };

        // ---- PASS 1: probe export to obtain the embedded Virgil @font-face ----
        // Excalidraw ships the Virgil font ONLY inside exported SVGs. In the
        // bare page it is unavailable, so any width measurement falls back to
        // serif (wrong metrics). We export once, rip the @font-face out, inject
        // it into the page, and load it — so the page now really has Virgil.
        const probeSvg = await excal.exportToSvg(exportOpts);
        const probeStr = new XMLSerializer().serializeToString(probeSvg);
        const fontFaceMatches = probeStr.match(/@font-face\s*\{[^}]+\}/g) || [];
        if (fontFaceMatches.length) {
          const style = document.createElement("style");
          style.textContent = fontFaceMatches.join("\n");
          document.head.appendChild(style);
          try {
            await document.fonts.load("1px Virgil");
            await document.fonts.ready;
          } catch (e) {}
        }

        // ---- PASS 2: final export, then fix text centering on the SVG DOM ----
        // exportToSvg computes text x/y itself and IGNORES any coordinates we
        // set on the scene elements (verified: setting text.x to 50/200/500
        // all yield the same output). It computes them with an internal font
        // width estimate that does NOT match real Virgil, so bound labels end
        // up off-center. The only layer where we can correct this is the SVG
        // DOM AFTER export — move each <text> to the center of its container.
        const svg = await excal.exportToSvg(exportOpts);

        if (!svg || svg.tagName.toLowerCase() !== "svg") {
          throw new Error(
            "exportToSvg did not return an <svg> element " +
            "(got " + (svg ? svg.tagName : "null") + ")."
          );
        }

        // Temporarily attach the SVG to the document so getBBox() works (it
        // needs a rendered/layout context; detached SVG elements return 0).
        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);

        // Build a list of container shapes (rect + the bbox of each hand-drawn
        // path) so we can find which shape each text belongs to.
        // Excalidraw renders boxes as <path> (rough.js) and plain rects as
        // <rect>. We approximate a shape's box by its bounding box.
        const shapes = [];
        for (const node of svg.querySelectorAll("rect, path, ellipse, polygon")) {
          try {
            const bb = node.getBBox();
            if (bb.width > 40 && bb.height > 20) {
              shapes.push({ x: bb.x, y: bb.y, w: bb.width, h: bb.height, cx: bb.x + bb.width / 2, cy: bb.y + bb.height / 2 });
            }
          } catch (e) {}
        }

        for (const textEl of svg.querySelectorAll("text")) {
          const fs = parseFloat(textEl.getAttribute("font-size") || "18");
          // The text's current x (exportToSvg's wrong guess, anchor=middle so
          // x is the text center) and y (baseline).
          let cx = parseFloat(textEl.getAttribute("x"));
          let cy = parseFloat(textEl.getAttribute("y")) - fs * 0.35; // baseline -> approx visual center
          // Find the smallest shape whose center is closest to (cx, cy) and
          // that actually contains this point — that is the label's container.
          let best = null;
          for (const s of shapes) {
            const inside = cx >= s.x - 5 && cx <= s.x + s.w + 5 && cy >= s.y - 5 && cy <= s.y + s.h + 5;
            if (!inside) continue;
            const d = Math.hypot(cx - s.cx, cy - s.cy);
            if (!best || d < best.d) best = { d, s };
          }
          if (!best) continue;
          // Re-center: text-anchor=middle so x = box center; y baseline = box center + ~0.35*fs
          textEl.setAttribute("x", best.s.cx);
          textEl.setAttribute("y", best.s.cy + fs * 0.35);
        }

        window.__lastSvg = new XMLSerializer().serializeToString(svg);

        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        return { success: false, error: String(err && err.message ? err.message : err) };
      }
    };
  </script>
</body>
</html>
